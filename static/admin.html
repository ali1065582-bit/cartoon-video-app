<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المدير السرية 💰</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; padding: 40px; text-align: center; }
        .card { background-color: #2a2a2a; border-radius: 15px; padding: 30px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background-color: #00ffcc; color: black; font-size: 18px; font-weight: bold; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #00b38f; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>👑 لوحة التحكم السرية للمستثمر (نهاد)</h1>
        <p>مرحباً بك يا مدير. من هنا يمكنك التحكم بالنظام وتفعيل ميزة الـ Infinite Loop لقناتك.</p>
        <hr style="border-color: #444;">
        <h3>⚡ خيار المالك المحمي:</h3>
        <button onclick="activateLoop()">تفعيل النقاط اللانهائية وباقة PRO 🐳</button>
    </div>

    <script>
        async function activateLoop() {
            try {
                // استخدام مسار نسبي مباشر لتخطي حظر الأمان (CORS) نهائياً
                const response = await fetch('/api/admin/activate-infinite-points/?username=' + encodeURIComponent('نهاد'), { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert("🎯 تم التفعيل بنجاح يا مدير نهاد!\n" + data.message);
                } else {
                    alert("⚠️ التفعيل فشل: " + data.detail);
                }
            } catch (error) {
                alert("❌ خطأ في الاتصال بالسيرفر!");
            }
        }
    </script>
</body>
</html>
